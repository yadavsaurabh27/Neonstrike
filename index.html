<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Breach FPS</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="game">
      <canvas id="scene"></canvas>

      <section id="start-screen" class="overlay">
        <div class="start-copy">
          <p class="eyebrow">FPV Arena Shooter</p>
          <h1>Neon Breach</h1>
          <p class="summary">
            Lock in, breach the synth-grid, and clear hostile drones before the
            reactor timer burns out.
          </p>
          <button id="start-button" type="button">Start Mission</button>
        </div>
      </section>

      <section id="hud" aria-live="polite">
        <div class="hud-row top">
          <div class="meter">
            <span>Health</span>
            <strong id="health">100</strong>
          </div>
          <div class="meter">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="meter">
            <span>Wave</span>
            <strong id="wave">1</strong>
          </div>
          <div class="meter">
            <span>Ammo</span>
            <strong id="ammo">24</strong>
          </div>
        </div>
        <div id="crosshair" aria-hidden="true"></div>
        <div id="damage-vignette" aria-hidden="true"></div>
        <div id="message">Click to capture mouse. WASD move, mouse aim, click fire, R reload.</div>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
